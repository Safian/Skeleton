# =============================================================
# /etc/fail2ban/action.d/skeleton-alert.conf
#
# Fail2Ban akció: minden ban/unban eseményt elküld a Skeleton API-nak.
#
# Használat a jail konfigurációban (pl. /etc/fail2ban/jail.local):
#   [sshd]
#   enabled  = true
#   port     = ssh
#   filter   = sshd
#   action   = iptables-multiport[name=sshd, port="ssh", protocol=tcp]
#              skeleton-alert[name=sshd]
#   logpath  = /var/log/auth.log
#   maxretry = 5
#   bantime  = 3600
# =============================================================

[Definition]
actionstart =
actionstop  =
actioncheck =

# IP kitiltásakor
actionban   = /opt/skeleton/scripts/fail2ban_alert.sh banned <ip> <name> <failures>

# IP feloldásakor
actionunban = /opt/skeleton/scripts/fail2ban_alert.sh unbanned <ip> <name> 0

[Init]
name = default
