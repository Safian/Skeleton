name: skeleton_app
description: Flutter Skeleton – Supabase + BLoC alapú sablon projekt
version: 0.1.0+2
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared package (theme, components, models)
  skeleton_shared:
    path: ../shared

  # Supabase
  supabase_flutter: ^2.12.0

  # State management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.0

  # Config / env
  flutter_dotenv: ^5.1.0

  # Secure storage – iOS Keychain / Android Keystore
  flutter_secure_storage: ^9.2.4

  # URL launcher (store link, deep link)
  url_launcher: ^6.3.1

  # Tutorial / feature walkthrough
  showcaseview: ^3.0.0
  shared_preferences: ^2.3.5

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Device + package info (session logging)
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0

  # Deep links – iOS Universal Links + Android App Links + web
  app_links: ^6.3.4

  # Push notifications (FCM) – Firebase projekt konfig szükséges
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_gen_runner: ^5.7.0  # opcionális codegen

flutter:
  generate: true  # [M4.2] l10n codegen bekapcsolása
  uses-material-design: true
  assets:
    - .env
