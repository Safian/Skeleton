name: skeleton_app
description: Flutter Skeleton – Supabase + BLoC alapú sablon projekt
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.12.0

  # State management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.0

  # Config / env
  flutter_dotenv: ^5.1.0

  # [M5] Verziószám lekéréshez (force/soft update)
  package_info_plus: ^8.0.0

  # [M6] Eszközadat gyűjtés (SessionLogger)
  device_info_plus: ^10.0.0

  # [M7/M8] Local tárhely (tutorial seen state)
  shared_preferences: ^2.3.0

  # [M5] URL nyitás (App Store linkek)
  url_launcher: ^6.3.0

  # Deep links – iOS Universal Links + Android App Links + web
  app_links: ^6.3.4

  # Push notifications (FCM) – Firebase projekt konfig szükséges
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
