name: skeleton_admin
description: Flutter Skeleton – Admin alkalmazás
version: 0.1.0+2
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared package (theme, components, models)
  skeleton_shared:
    path: ../shared

  supabase_flutter: ^2.12.0

  # Secure storage – iOS Keychain / Android Keystore
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.0
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.0

  # [M5] Verziószám (update check)
  package_info_plus: ^8.0.0

  # [M6] Eszközadat gyűjtés
  device_info_plus: ^10.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
