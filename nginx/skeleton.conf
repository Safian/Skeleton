# =============================================================
# Nginx konfiguráció – Skeleton app
#
# Kiszolgálja:
#   - Flutter web buildet
#   - Supabase API reverse proxy-t
#   - .well-known fájlokat (Apple/Google app verification)
#   - SSL (Let's Encrypt / certbot)
# =============================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HTTP → HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Flutter Web app ────────────────────────────────────────
    root /var/www/skeleton;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Supabase API reverse proxy ─────────────────────────────
    location /rest/v1/ {
        proxy_pass http://localhost:8000/rest/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/v1/ {
        proxy_pass http://localhost:8000/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/v1/ {
        proxy_pass http://localhost:8000/storage/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location /functions/v1/ {
        proxy_pass http://localhost:8000/functions/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Realtime, Gemini Live)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /realtime/v1/ {
        proxy_pass http://localhost:8000/realtime/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── .well-known (Apple/Google domain verification) ─────────
    #
    # Apple Associated Domains (Sign in with Apple, Universal Links):
    #   Content-Type: application/json kötelező!
    location = /.well-known/apple-app-site-association {
        alias /var/www/skeleton/.well-known/apple-app-site-association;
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Google Digital Asset Links (Google Sign-In, App Links):
    location = /.well-known/assetlinks.json {
        alias /var/www/skeleton/.well-known/assetlinks.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # General .well-known block
    location ^~ /.well-known/ {
        alias /var/www/skeleton/.well-known/;
        default_type application/json;
    }

    # ── Security headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
